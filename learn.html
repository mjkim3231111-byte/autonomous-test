<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>학습 데이터 만들기 - AI 드라이빙 멘토</title>
  <style>
    /* =========================================
       기본 배경 및 폰트 설정
       ========================================= */
    body { 
      font-family: 'Malgun Gothic', sans-serif; 
      background-color: #f1f5f9; 
      margin: 0; 
      padding: 0; 
      color: #333; 
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
    }
    
    .header { margin-top: 40px; text-align: center; }
    .header h1 { margin: 0; font-size: 32px; color: #002D62; letter-spacing: -1px; }
    
    /* =========================================
       단계별 카드 컨테이너
       ========================================= */
    .card-container {
      width: 100%;
      max-width: 800px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.1);
      margin: 30px 20px;
      padding: 40px;
      box-sizing: border-box;
      position: relative;
      overflow: hidden;
    }

    /* 진행률 표시 바 */
    .progress-bar { display: flex; justify-content: space-between; margin-bottom: 30px; position: relative; }
    .progress-bar::before { content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 4px; background: #e2e8f0; z-index: 1; transform: translateY(-50%); }
    .step-dot { width: 30px; height: 30px; background: #e2e8f0; color: #64748b; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; z-index: 2; position: relative; transition: all 0.3s; cursor: pointer; }
    .step-dot:hover { transform: scale(1.1); }
    .step-dot.active { background: #002D62; color: white; box-shadow: 0 0 10px rgba(0, 45, 98, 0.5); }
    .step-dot.completed { background: #3b82f6; color: white; }

    /* 단계별 화면 (처음엔 1단계만 보임) */
    .step-content { display: none; animation: fadeIn 0.5s; }
    .step-content.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .step-title { font-size: 24px; color: #0f172a; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
    .step-desc { font-size: 16px; color: #475569; margin-bottom: 25px; line-height: 1.6; }

    /* 다음/이전 버튼 */
    .btn-group { display: flex; justify-content: space-between; margin-top: 40px; }
    .btn { padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: all 0.2s; border: none; font-size: 16px; text-decoration: none; text-align: center; }
    .btn-prev { background-color: #f1f5f9; color: #475569; margin-right: 15px; }
    .btn-prev:hover { background-color: #e2e8f0; }
    .btn-next { background-color: #3b82f6; color: white; box-shadow: 0 4px 6px rgba(59, 130, 246, 0.3); margin-left: auto; }
    .btn-next:hover { background-color: #2563eb; transform: translateY(-2px); }
    .btn-home { background-color: #e2e8f0; color: #475569; }
    .btn-home:hover { background-color: #cbd5e1; }

    /* =========================================
       1단계: 영상 영역
       ========================================= */
    .video-container { border-radius: 10px; overflow: hidden; background: #000; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    video { width: 100%; display: block; }

    /* =========================================
       3단계: 미니 시뮬레이터 영역 (실제 프로그램 구현)
       ========================================= */
