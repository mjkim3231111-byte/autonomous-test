<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>조향각 실습 시연</title>
  <style>
    body { font-family: 'Malgun Gothic', sans-serif; background-color: #f8fafc; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-top: 50px; }
    .dashboard { width: 90%; max-width: 800px; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
    h1 { color: #002D62; margin-bottom: 30px; }
    
    /* 시뮬레이터 화면 */
    .simulator-box { width: 100%; height: 400px; background: #334155; position: relative; border-radius: 15px; margin: 30px 0; display: flex; align-items: center; justify-content: center; color: #cbd5e1; font-size: 20px; border: 5px solid #e2e8f0; }
    
    /* 시연 버튼 */
    .demo-controls { display: flex; justify-content: center; gap: 20px; }
    .demo-btn { padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 12px; cursor: pointer; border: none; transition: 0.3s; }
    .btn-wrong { background: #ef4444; color: white; }
    .btn-wrong:hover { background: #dc2626; }
    .btn-correct { background: #22c55e; color: white; }
    .btn-correct:hover { background: #16a34a; }
    
    .btn-home { display: inline-block; margin-top: 30px; color: #64748b; text-decoration: none; font-size: 14px; }
  </style>
</head>
<body>

  <div class="dashboard">
    <h1>교사용 조향각 실습 시연</h1>
    
    <div class="simulator-box" id="trackBox">
      [시연용 주행 트랙 화면이 출력됩니다]
    </div>

    <div class="demo-controls">
      <button class="demo-btn btn-wrong" onclick="alert('오답 예시: 조향각이 차선과 평행하지 않습니다.')">❌ 오답 예시</button>
      <button class="demo-btn btn-correct" onclick="alert('모범 답안: 차선과 평행하게 정렬되었습니다.')">✅ 모범 답안</button>
    </div>

    <a href="index.html" class="btn-home">⬅️ 메인 화면으로 돌아가기</a>
  </div>

</body>
</html>
