<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>실시간 자동 채점 및 코칭 - AI 드라이빙 멘토</title>
  <style>
    /* 기본 배경 및 프리미엄 폰트 설정 */
    body { 
      font-family: 'Malgun Gothic', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      background-color: #f1f5f9; 
      margin: 0; 
      padding: 0; 
      color: #333;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    
    /* 상단 헤더 */
    .header { 
      background: linear-gradient(135deg, #002D62 0%, #00152e 100%);
      color: white; 
      text-align: center; 
      padding: 30px 20px; 
      box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
    }
    .header h1 { 
      margin: 0; 
      font-size: 32px; 
      letter-spacing: -1px; 
    }
    .header p { 
      margin-top: 10px; 
      font-size: 16px; 
      color: #93c5fd; 
    }
    
    /* 메인 콘텐츠 컨테이너 */
    .container { 
      max-width: 900px; 
      width: 100%;
      margin: -20px auto 40px auto; 
      padding: 0 20px;
      box-sizing: border-box;
      flex-grow: 1;
    }
    
    /* 웹앱을 감싸는 카드 프레임 */
    .card { 
      background: white; 
      border-radius: 20px; 
      box-shadow: 0 15px 30px rgba(0,0,0,0.08); 
      overflow: hidden;
      border: 1px solid #e2e8f0;
      display: flex;
      flex-direction: column;
    }
    
    /* 연동 안내 헤더 바 */
    .sync-status-bar {
      background-color: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 14px;
      color: #475569;
    }
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background-color: #10b981;
      border-radius: 50%;
      margin-right: 6px;
      box-shadow: 0 0 8px #10b981;
    }
    
    /* 아이프레임 영역 */
    .iframe-wrapper {
      position: relative;
      width: 100%;
      height: 780px; /* 구글 웹앱 높이에 알맞게 충분히 지정 */
      background: #ffffff;
    }
    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    
    /* 제어 버튼 및 푸터 */
    .actions {
      text-align: center;
      margin-top: 25px;
      margin-bottom: 20px;
    }
    .back-btn { 
      display: inline-flex; 
      align-items: center;
      gap: 8px;
      padding: 12px 25px; 
      background-color: #e2e8f0; 
      color: #475569; 
      text-decoration: none; 
      border-radius: 10px; 
      font-weight: bold; 
      transition: all 0.2s; 
      border: none;
      cursor: pointer;
    }
    .back-btn:hover { 
      background-color: #cbd5e1; 
      color: #0f172a; 
      transform: translateY(-2px);
    }
    
    .footer { 
      text-align: center; 
      padding: 20px; 
      color: #94a3b8; 
      font-size: 13px; 
      margin-top: auto;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>🚀 실시간 자동 채점 및 코칭</h1>
    <p>스마트 패드로 찰칵! 찍으면 AI가 궤적을 분석하고 구글 시트에 즉시 누적합니다.</p>
  </div>

  <div class="container">
    <div class="card">
      <div class="sync-status-bar">
        <span>🏎️ 자율주행 드라이빙 멘토 시스템</span>
        <span style="display: flex; align-items: center;">
          <span class="status-dot"></span>구글 스프레드시트 실시간 동기화 중
        </span>
      </div>
      <div class="iframe-wrapper">
        <!-- 구글 앱스 스크립트 웹앱 주소 임베딩 -->
        <iframe src="https://script.google.com/macros/s/AKfycby7Gze5OhYiMCaBrghCf8FdTbRL1M2efT0pzNxwGRZrjafL0w8uC9YH-ZHfTvZZjHo/exec" title="자율주행 자동 채점기"></iframe>
      </div>
    </div>

    <div class="actions">
      <a href="index.html" class="back-btn">⬅️ 메인 화면으로 돌아가기</a>
    </div>
  </div>

  <div class="footer">
    © 2026 AI 드라이빙 멘토 프로젝트 • Google Sheets API Cloud 연동 완료
  </div>

</body>
</html>
