<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 드라이빙 멘토 - 메인 화면</title>
  <style>
    body { 
      font-family: 'Malgun Gothic', sans-serif; 
      background-color: #f1f5f9; 
      margin: 0; 
      padding: 0; 
      color: #333; 
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    
    /* 표지 (대문) 영역 */
    .header { text-align: center; margin-bottom: 50px; }
    .header h1 { margin: 0; font-size: 46px; color: #002D62; letter-spacing: -1px; font-weight: 900; }
    .header p { font-size: 20px; color: #64748b; margin-top: 15px; font-weight: bold; }
    
    /* 3개의 카드 영역 */
    .menu-container {
      display: flex;
      gap: 30px;
      width: 100%;
      max-width: 1000px;
      padding: 0 20px;
      box-sizing: border-box;
      flex-wrap: wrap;
      justify-content: center;
    }

    .menu-card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      padding: 40px 30px;
      width: 280px;
      text-align: center;
      transition: all 0.3s ease;
      border: 3px solid transparent;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .menu-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 35px rgba(0, 45, 98, 0.15);
      border-color: #002D62;
    }

    .icon { font-size: 55px; margin-bottom: 20px; display: block; }
    .menu-card h2 { font-size: 24px; color: #0f172a; margin: 0 0 15px 0; font-weight: bold; }
    .menu-card p { font-size: 16px; color: #64748b; line-height: 1.6; margin: 0 0 30px 0; word-break: keep-all; }

    .btn-launch {
      display: block;
      padding: 15px 20px;
      background-color: #f1f5f9;
      color: #475569;
      text-decoration: none;
      font-weight: bold;
      border-radius: 12px;
      transition: all 0.2s;
      font-size: 18px;
    }

    .menu-card:hover .btn-launch {
      background-color: #002D62;
      color: white;
    }

    /* 3번째 자동 평가 카드 강조 */
    .eval-card { border-color: #3b82f6; background: linear-gradient(to bottom, #ffffff, #f8fafc); }
    .eval-card .btn-launch { background-color: #3b82f6; color: white; box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3); }
    .eval-card .btn-launch:hover { background-color: #2563eb; }
  </style>
</head>
<body>

  <div class="header">
    <h1>🤖 자율주행 어노테이션 교육 시스템</h1>
    <p>전주공업고등학교 전기과 조향각 제어 실습</p>
  </div>

  <div class="menu-container">
    
    <div class="menu-card">
      <div>
        <span class="icon">📘</span>
        <h2>1. 자율주행 가이드</h2>
        <p>인공지능 자율주행 자동차의 기본 원리와 조향 제어 어노테이션 개념을 학습합니다.</p>
      </div>
      <a href="guide.html" class="btn-launch">가이드 보기 ➡️</a>
    </div>

    <div class="menu-card">
      <div>
        <span class="icon">🎯</span>
        <h2>2. 조향각 실습 훈련</h2>
        <p>교사 주도 시연용 시뮬레이터로 조향각 평행 원리와 채점 기준을 배웁니다.</p>
      </div>
      <a href="study_teacher.html" class="btn-launch">실습 시작 🚀</a>
    </div>

    <div class="menu-card eval-card">
      <div>
        <span class="icon">📊</span>
        <h2>3. 자동 평가 시스템</h2>
        <p>실시간으로 오차를 분석하여 어노테이션 정밀도를 자동으로 평가하고 판정합니다.</p>
      </div>
      <a href="auto_eval.html" class="btn-launch">평가 시스템 접속 🎯</a>
    </div>

  </div>

</body>
</html>
