<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>AI 드라이빙 멘토 - 메인 시스템</title>
  <style>
    body { font-family: 'Malgun Gothic', sans-serif; background-color: #f1f5f9; text-align: center; padding: 80px 20px; }
    .header { margin-bottom: 60px; }
    .header h1 { font-size: 48px; color: #002D62; font-weight: 900; }
    .header p { font-size: 20px; color: #64748b; margin-top: 15px; }
    .btn-start { padding: 20px 50px; font-size: 24px; background: #002D62; color: white; border: none; border-radius: 50px; cursor: pointer; transition: 0.3s; }
    .btn-start:hover { background: #1e3a8a; transform: scale(1.05); }
    
    .card-container { display: none; justify-content: center; gap: 30px; margin-top: 50px; flex-wrap: wrap; }
    .card { background: white; padding: 40px 30px; border-radius: 20px; width: 260px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); transition: 0.3s; }
    .card:hover { transform: translateY(-10px); }
    .btn-link { display: block; margin-top: 25px; padding: 15px; background: #3b82f6; color: white; text-decoration: none; border-radius: 12px; font-weight: bold; }
    .btn-link:hover { background: #2563eb; }
  </style>
</head>
<body>

  <div id="coverPage" class="header">
    <h1>🤖 AI 드라이빙 멘토</h1>
    <p>자율주행 조향각 제어 학습을 위한 통합 플랫폼입니다.</p>
    <button class="btn-start" onclick="showCards()">시스템 시작하기</button>
  </div>

  <div id="cardPage" class="card-container">
    <div class="card">
      <h3>📘 1. 자율주행 가이드</h3>
      <p>이론과 기본 개념을 학습합니다.</p>
      <a href="guide.html" class="btn-link">가이드 접속</a>
    </div>
    <div class="card">
      <h3>🎯 2. 조향각 실습</h3>
      <p>교사 주도 실시간 시연 훈련.</p>
      <a href="study_teacher.html" class="btn-link">실습 시작</a>
    </div>
    <div class="card">
      <h3>📊 3. 자동 평가</h3>
      <p>AI 기반 정밀 데이터 분석.</p>
      <a href="auto_eval.html" class="btn-link">평가 접속</a>
    </div>
  </div>

  <script>
    function showCards() {
      document.getElementById('coverPage').style.display = 'none';
      document.getElementById('cardPage').style.display = 'flex';
    }
  </script>
</body>
</html>
