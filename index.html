<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 드라이빙 멘토 - 메인 화면</title>
  <style>
    body { 
      font-family: 'Malgun Gothic', sans-serif; 
      background-color: #f1f5f9; 
      margin: 0; 
      padding: 0; 
      color: #333; 
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    
    .header { text-align: center; margin-bottom: 40px; }
    .header h1 { margin: 0; font-size: 42px; color: #002D62; letter-spacing: -1px; font-weight: 900; }
    .header p { font-size: 18px; color: #64748b; margin-top: 12px; }
    
    .menu-container {
      display: flex;
      gap: 25px;
      width: 100%;
      max-width: 900px;
      padding: 0 20px;
      box-sizing: border-box;
      flex-wrap: wrap;
      justify-content: center;
    }

    .menu-card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      padding: 35px;
      width: 260px;
      text-align: center;
      transition: all 0.3s ease;
      border: 2px solid transparent;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .menu-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 35px rgba(0, 45, 98, 0.15);
      border-color: #002D62;
    }

    .icon { font-size: 48px; margin-bottom: 15px; display: block; }
    .menu-card h2 { font-size: 22px; color: #0f172a; margin: 0 0 12px 0; font-weight: bold; }
    .menu-card p { font-size: 15px; color: #64748b; line-height: 1.5; margin: 0 0 25px 0; word-break: keep-all; }

    .btn-launch {
      display: block;
      padding: 12px 20px;
      background-color: #f1f5f9;
      color: #475569;
      text-decoration: none;
      font-weight: bold;
      border-radius: 10px;
      transition: all 0.2s;
      font-size: 16px;
    }

    .menu-card:hover .btn-launch {
      background-color: #002D62;
      color: white;
    }

    /* 교사용 시연 화면 강조 */
    .active-card { border-color: #3b82f6; background: linear-gradient(to bottom, #ffffff, #f8fafc); }
    .active-card .btn-launch { background-color: #3b82f6; color: white; box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3); }
    .active-card .btn-launch:hover { background-color: #2563eb; }
  </style>
</head>
<body>

  <div class="header">
    <h1>🤖 AI 드라이빙 멘토 교육 플랫폼</h1>
    <p>전주공업고등학교 전기과 자율주행 실습 시스템</p>
  </div>

  <div class="menu-container">
    
    <div class="menu-card">
      <div>
        <span class="icon">📘</span>
        <h2>1. 자율주행 이론</h2>
        <p>인공지능 자율주행 자동차의 기본 원리와 조향 제어 개념을 학습합니다.</p>
      </div>
      <a href="theory.html" class="btn-launch">이론 학습방 ➡️</a>
    </div>

    <div class="menu-card active-card">
      <div>
        <span class="icon">🎯</span>
        <h2>2. 평가 가이드 훈련</h2>
        <p>교사 주도 시연용 시뮬레이터로 조향각 평행 원리와 채점 기준을 배웁니다.</p>
      </div>
      <a href="study_teacher.html" class="btn-launch">시연 시스템 시작 🚀</a>
    </div>

    <div class="menu-card">
      <div>
        <span class="icon">💻</span>
        <h2>3. 실전 데이터 수집</h2>
        <p>실제 프로그램 가이드를 참고하여 나만의 자율주행 학습 데이터를 생성합니다.</p>
      </div>
      <a href="#" class="btn-launch">실전 실습방 (예정)</a>
    </div>

  </div>

</body>
</html>
